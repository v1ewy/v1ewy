<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <clipPath id="termClip">
      <rect x="0" y="0" width="700" height="220" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#termClip)">
    <rect x="0" y="0" width="700" height="220" fill="#0d0d0d"/>
    <rect x="0" y="0" width="700" height="34" fill="#161616"/>
    <circle cx="26" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="17" r="6" fill="#ffffff" opacity="0.55"/>
    <circle cx="70" cy="17" r="6" fill="#ff0000"/>
    <text x="350" y="22" text-anchor="middle" font-size="13" fill="#888888">v1ewy@root: ~</text>

    <text x="22" y="68" font-size="16" fill="#ff2b2b" opacity="0">
      v1ewy@root:~$ whoami
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.025;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="22" y="98" font-size="16" fill="#ffffff" opacity="0">
      &gt; v1ewy
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.13;0.135;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="22" y="128" font-size="16" fill="#ff2b2b" opacity="0">
      v1ewy@root:~$ cat interests.txt
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.24;0.245;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="22" y="158" font-size="16" fill="#ffffff" opacity="0">
      &gt; infosec // hardware // os internals // networks
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.37;0.375;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="22" y="188" font-size="16" fill="#ff2b2b" opacity="0">
      v1ewy@root:~$
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.505;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <rect x="150" y="175" width="9" height="16" fill="#ff0000">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.505;0.86;0.87;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="1" y="1" width="698" height="218" rx="13" fill="none" stroke="#ff0000" stroke-width="1.5"/>
</svg>
